<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#8CBBCD" />
  <title>深深攻略地圖 · 愛妮島</title>
  <meta name="description" content="愛妮島在地嚴選：餐廳、咖啡、景點、夜生活一鍵搜尋。" />

  <!-- Google Fonts: Noto Sans TC -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="css/style.css?v=20260425d" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img class="brand-logo" src="assets/ENGO.png" alt="EL NIDO GO" />
        <div class="brand-text">
          <h1 class="title">深深攻略地圖</h1>
          <p class="subtitle">愛妮島在地嚴選</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="searchBtn" class="icon-btn" aria-label="搜尋地標"></button>
        <button id="infoBtn" class="icon-btn" aria-label="關於此地圖"></button>
      </div>
    </div>
    <div id="searchWrap" class="search-wrap" hidden>
      <div class="search-inner">
        <span class="search-icon" id="searchIconSlot"></span>
        <input id="searchInput" class="search-input" type="search" placeholder="搜尋店家、行程…" />
        <button id="searchClear" class="search-clear" aria-label="清除">✕</button>
      </div>
      <ul id="searchResults" class="search-results" hidden></ul>
    </div>
  </header>

  <main id="map" aria-label="地圖"></main>

  <!-- 分類選單（手機在底部，桌機在右側） -->
  <nav id="categoryBar" class="category-bar" aria-label="分類">
    <button class="cat-btn active" data-category="__all__">
      <span class="cat-icon">🌏</span><span class="cat-label">全部</span>
    </button>
    <!-- 其餘按鈕由 JS 注入 -->
  </nav>

  <!-- 分類清單面板 -->
  <aside id="listPanel" class="list-panel" hidden>
    <div class="sheet-handle"></div>
    <header class="list-header">
      <span class="list-head-icon" id="listHeadIcon"></span>
      <h2 class="list-title" id="listTitle"></h2>
      <span class="list-count" id="listCount"></span>
      <button type="button" class="list-close" id="listClose" aria-label="關閉">✕</button>
    </header>
    <ul class="list-items" id="listItems"></ul>
  </aside>

  <!-- 詳情面板（從底部滑出） -->
  <div id="detailSheet" class="detail-sheet" hidden>
    <div class="sheet-handle"></div>
    <button id="sheetClose" class="sheet-close" aria-label="關閉">✕</button>
    <div class="sheet-body">
      <h2 id="sheetName" class="sheet-name"></h2>
      <p id="sheetCategory" class="sheet-category"></p>
      <div id="sheetDesc" class="sheet-desc"></div>
      <div class="sheet-actions">
        <a id="sheetNav" class="btn-primary" target="_blank" rel="noopener">
          <span>🧭</span> 導航到這裡
        </a>
        <button id="sheetCopy" class="btn-secondary">複製座標</button>
      </div>
    </div>
  </div>

  <!-- 關於彈窗 -->
  <div id="infoModal" class="info-modal" hidden>
    <div class="info-card">
      <button id="infoClose" class="sheet-close" aria-label="關閉">✕</button>
      <h2>關於這張地圖</h2>
      <div id="infoDesc"></div>
      <p class="info-meta" id="infoMeta"></p>
      <p class="info-hint">
        資料來自深深團隊在愛妮島的實地推薦。
        <span class="legend-warn">●</span> 紅色代表踩雷店家，請避開。
      </p>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Leaflet MarkerCluster -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
  <script src="js/app.js?v=20260425d"></script>
</body>
</html>
