name: 同步 My Maps KML

on:
  # 每天台灣時間早上 8 點自動跑（UTC 0 點）
  schedule:
    - cron: '0 0 * * *'
  # 也允許手動從 GitHub 介面觸發
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 執行同步腳本
        run: node scripts/sync-kml.js

      - name: 檢查並 commit 變更
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "資料沒變動，跳過 commit"
          else
            git add data/places.json data/map.kml
            git commit -m "自動同步 My Maps：$(date -u +%Y-%m-%d)"
            git push
          fi
